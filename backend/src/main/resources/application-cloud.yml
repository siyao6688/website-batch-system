server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: website-batch-system

  datasource:
    # 本地MySQL连接配置
    # 注意：需要先在服务器上安装MySQL并创建数据库
    # 创建数据库命令：
    # mysql -u root -p
    # CREATE DATABASE website_batch_system CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
    # GRANT ALL PRIVILEGES ON website_batch_system.* TO 'root'@'localhost';
    # FLUSH PRIVILEGES;
    url: jdbc:mysql://localhost:3306/website_batch_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Aa123456.
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  thymeleaf:
    enabled: false

# 网站生成配置
website:
  output-path: /var/www/html
  templates-path: /opt/website-batch-system/templates
  nginx-config-path: /etc/nginx/sites-enabled
  preview-output-path: /opt/website-batch-system/preview-websites

  # 服务器部署配置（服务器上的SSH密钥路径）
  deployment:
    enabled: false  # 服务器上通常不需要远程部署到自己
    server:
      host: 124.223.45.101
      port: 22
      username: root
      private-key-path: /root/.ssh/id_rsa  # 服务器上的SSH私钥路径
    remote:
      web-root: /var/www/html
      nginx-sites-available: /etc/nginx/sites-available
      nginx-sites-enabled: /etc/nginx/sites-enabled
      nginx-reload-command: sudo systemctl reload nginx

logging:
  level:
    com.website: info
    org.springframework.web: warn

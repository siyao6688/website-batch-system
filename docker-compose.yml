version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: website-batch-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: website_batch_system
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./backend/src/main/resources/application-cloud.yml:/app/application-cloud.yml
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-batch-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: cloud
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/website_batch_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      WEBSITE_OUTPUT_PATH: /var/www/html
    volumes:
      - ./backend/src/main/resources/templates:/app/templates
      - ./backend/src/main/resources/static:/app/static
      - nginx_html:/var/www/html
      - ./backend/src/main/resources/application-cloud.yml:/app/application-cloud.yml
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

volumes:
  mysql_data:
  nginx_html:

networks:
  backend:
    driver: bridge

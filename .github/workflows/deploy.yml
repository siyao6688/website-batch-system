name: Deploy Website Batch System

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/.gitignore'
      - '**/.claude/**'
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build and test backend
      working-directory: ./backend
      run: |
        mvn clean package -DskipTests
        echo "Backend build completed"

    - name: Build frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
      env:
        NODE_ENV: production

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          echo "=== 开始部署网站批量处理系统 ==="

          # 进入部署目录
          cd /opt

          # 如果目录不存在，克隆仓库
          if [ ! -d "website-batch-system" ]; then
            echo "克隆仓库..."
            git clone https://github.com/${{ github.repository }}.git website-batch-system
          fi

          # 进入项目目录
          cd website-batch-system

          # 拉取最新代码
          echo "拉取最新代码..."
          git pull origin main

          # 检查并安装Docker Compose（如果未安装）
          if ! command -v docker-compose &> /dev/null; then
            echo "安装Docker Compose..."
            curl -L "https://github.com/docker/compose/releases/download/v2.23.3/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose
          fi

          # 停止并重建服务
          echo "重建Docker服务..."
          docker-compose down || true
          docker-compose up -d --build

          # 等待服务启动
          echo "等待服务启动..."
          sleep 10

          # 检查服务状态
          echo "服务状态："
          docker-compose ps

          echo "=== 部署完成 ==="
          echo "访问地址：http://${{ secrets.SERVER_HOST }}"

    - name: Verify deployment
      run: |
        echo "部署完成，请在服务器上验证服务状态"
        echo "检查命令："
        echo "ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'cd /opt/website-batch-system && docker-compose ps'"
        echo "访问地址：http://${{ secrets.SERVER_HOST }}"